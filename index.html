<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UnfollowSpy – Track Your Unfollowers Across Every Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #fff; }
    nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; }
    nav a { color: #aaa; text-decoration: none; font-size: 14px; margin-left: 24px; }
    nav a:hover { color: #fff; }
    .logo { font-weight: 700; font-size: 20px; }
    .hero { text-align: center; padding: 100px 20px; }
    .hero h1 { font-size: 48px; font-weight: 800; margin-bottom: 16px; line-height: 1.15; }
    .hero p { font-size: 20px; color: #aaa; margin-bottom: 12px; }
    .platforms { font-size: 14px; color: #555; margin-bottom: 40px; }
    .waitlist-form { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; max-width: 480px; margin: 0 auto; }
    .waitlist-form input[type="email"] {
      flex: 1; min-width: 240px; padding: 14px 20px; border-radius: 9999px;
      border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 15px; outline: none;
    }
    .waitlist-form input[type="email"]:focus { border-color: #1d9bf0; }
    .waitlist-form input::placeholder { color: #555; }
    .btn { display: inline-block; background: #1d9bf0; color: #fff; padding: 14px 28px; border-radius: 9999px; font-weight: 600; font-size: 15px; border: none; cursor: pointer; white-space: nowrap; }
    .btn:hover { background: #1a8cd8; }
    .btn:disabled { background: #555; cursor: not-allowed; }
    #waitlist-msg { margin-top: 16px; font-size: 14px; color: #aaa; min-height: 20px; }
    #waitlist-msg.success { color: #00ba7c; }
    #waitlist-msg.error { color: #f4212e; }
    footer { text-align: center; padding: 40px; color: #555; font-size: 13px; border-top: 1px solid #222; margin-top: 80px; }
    footer a { color: #555; margin: 0 12px; text-decoration: none; }
    footer a:hover { color: #aaa; }
  </style>
</head>
<body>
  <nav>
    <span class="logo">UnfollowSpy</span>
    <div>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="refund.html">Refunds</a>
    </div>
  </nav>
  <div class="hero">
    <h1>Know Who Unfollowed You.<br>On Every Platform.</h1>
    <p>Track unfollowers, get notified when mutuals drop you, and grow smarter.</p>
    <p class="platforms">X &nbsp;·&nbsp; Instagram &nbsp;·&nbsp; Threads &nbsp;·&nbsp; TikTok &nbsp;·&nbsp; Bluesky &nbsp;·&nbsp; RedNote</p>
    <form class="waitlist-form" id="waitlist-form">
      <input type="email" id="email-input" placeholder="Enter your email" required />
      <button class="btn" type="submit" id="submit-btn">Join Waitlist</button>
    </form>
    <div id="waitlist-msg"></div>
  </div>
  <footer>
    <p>&copy; 2026 UnfollowSpy &nbsp;|&nbsp;
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
      <a href="refund.html">Refund Policy</a>
    </p>
  </footer>
  <script>
    const BACKEND = 'https://unfollowspy-backend.onrender.com';

    document.getElementById('waitlist-form').addEventListener('submit', async e => {
      e.preventDefault();
      const email = document.getElementById('email-input').value.trim();
      const btn = document.getElementById('submit-btn');
      const msg = document.getElementById('waitlist-msg');

      btn.disabled = true;
      btn.textContent = 'Joining...';
      msg.textContent = '';
      msg.className = '';

      try {
        const resp = await fetch(`${BACKEND}/waitlist`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await resp.json();

        if (resp.ok) {
          msg.textContent = "You're on the list! We'll let you know when we launch.";
          msg.className = 'success';
          document.getElementById('email-input').value = '';
        } else {
          msg.textContent = data.detail || 'Something went wrong. Try again.';
          msg.className = 'error';
        }
      } catch {
        msg.textContent = 'Could not connect. Try again later.';
        msg.className = 'error';
      }

      btn.disabled = false;
      btn.textContent = 'Join Waitlist';
    });
  </script>
</body>
</html>
